- name: search_agent

  _target_: uni_agent.agent_loop.UniAgentLoop

  concurrency: 512
  log_dir: /tmp/search_agent
  mask_abnormal_exit_traj: false

  interaction:
    action_timeout: 300
    max_turns: 64

  env:
    deployment:
      type: host
    env_variables:
      # Patched at launch time by the training script with the Ray head IP.
      RETRIEVAL_SERVICE_URL: "http://${RAY_HEAD_IP}:8001/retrieve"
      CRAWL_SERVICE_URL: "http://${RAY_HEAD_IP}:8001/crawl"

  tool_parser: hermes

  tools:
    - name: search
    - name: finish

  reward:
    name: search
