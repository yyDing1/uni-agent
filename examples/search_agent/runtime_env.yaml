working_dir: ./
excludes: ["/.git/"]
py_modules:
  - ./uni_agent
  - ./verl/verl
pip:
  packages:
    - swe-rex
    - loguru
    - pydantic
    - pydantic_settings
    - orjson
    - requests
    - volcengine-python-sdk
    - python-dotenv
  pip_check: false
env_vars:
  VLLM_USE_V1: "1"
  TORCH_DISTRIBUTED_BACKEND: "nccl"
  NCCL_IB_DISABLE: "0"
  RAY_worker_register_timeout_seconds: "120"
  PYTHONUNBUFFERED: "1"
