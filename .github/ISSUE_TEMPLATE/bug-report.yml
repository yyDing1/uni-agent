name: "Bug report"
description: Report a reproducible problem in Uni-Agent
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        Please provide enough detail for us to reproduce the issue. If this problem is caused by code under `verl/`, please mention whether the issue belongs to Uni-Agent integration code or to the submodule itself.

  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: A short description of what went wrong.
      placeholder: Running parallel interaction hangs after environment startup when using ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        Provide the exact steps needed to reproduce the problem.
        Include commands, config files, and dataset or model details when relevant.
      placeholder: |
        1. Initialize the repo with `git submodule update --init --recursive`
        2. Install with `pip install --no-deps -e ./verl && pip install -e .`
        3. Run `python ...`
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages, stack traces, or screenshots if helpful.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the project is most related to this issue?
      options:
        - core agent loop
        - interaction
        - tools
        - environment
        - deployment
        - reward / verification
        - training
        - dashboard
        - docs / examples
        - installation / dependencies
        - other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, GPU/runtime info, model backend, and any relevant package versions.
      placeholder: |
        OS:
        Python:
        CUDA:
        Backend (vllm / sglang / other):
        Uni-Agent commit:
        verl commit:
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant config and logs
      description: Paste relevant YAML, CLI flags, or log excerpts. Prefer code blocks over screenshots.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find an obvious duplicate.
          required: true
        - label: I can reproduce this with the information provided above.
          required: true
